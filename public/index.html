<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>퀴즈 이벤트</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="panel" id="quizPanel">
        <div class="topline">
          <span id="progressText">1 / 5</span>
          <span>3개 이상 정답 시 번호 등록</span>
        </div>

        <h1 id="questionText">문제를 불러오는 중...</h1>
        <div class="choices" id="choices"></div>

        <div class="actions">
          <button class="ghost" id="prevButton" type="button">이전</button>
          <button id="nextButton" type="button" disabled>다음</button>
        </div>
      </section>

      <section class="panel hidden" id="resultPanel">
        <div class="score-ring" id="scoreText">0 / 5</div>
        <h1 id="resultTitle">결과</h1>
        <p id="resultMessage"></p>

        <form class="number-form hidden" id="numberForm">
          <label for="chosenNumber">원하는 번호</label>
          <div class="inline-field">
            <input id="chosenNumber" name="chosenNumber" inputmode="numeric" autocomplete="off" placeholder="예: 27" required />
            <button type="submit">등록</button>
          </div>
          <p class="hint">숫자만 입력할 수 있으며, 이미 등록된 번호는 사용할 수 없습니다.</p>
        </form>

        <p class="status" id="statusText" role="status"></p>
        <button class="ghost" id="restartButton" type="button">다시 풀기</button>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
